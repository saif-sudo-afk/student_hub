{% extends "base.html" %}
{% block title %}Login | Student Hub{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="h4 mb-3">Welcome Back</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.username.id_for_label }}">Email</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                        {{ form.password }}
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Sign in</button>
                </form>
                <p class="mt-3 mb-0 text-muted">New student?
                    <a href="{% url 'accounts:register_student' %}">Create account</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
