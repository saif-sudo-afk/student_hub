{% extends "base.html" %}
{% block title %}AI Assistant | Student Hub{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-9">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h2 class="h4">AI Academic Assistant</h2>
                <p class="text-muted">Ask about courses, materials, assignments, or calendar events.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="query">Your question</label>
                        <textarea class="form-control" id="query" name="query" rows="4" required>{{ query }}</textarea>
                    </div>
                    <button class="btn btn-primary" type="submit">Ask assistant</button>
                </form>

                {% if answer %}
                    <hr>
                    <h3 class="h6">Assistant Answer</h3>
                    <pre style="white-space: pre-wrap;" class="mb-0">{{ answer }}</pre>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
